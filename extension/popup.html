<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    padding: 18px;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #111119;
    color: #d4d4d8;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #27AE60;
    flex-shrink: 0;
  }
  .header .dot.yellow { background: #F39C12; }
  .header .dot.red    { background: #E74C3C; }
  .header .dot.gray   { background: #555; }
  .title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  .section { margin-bottom: 16px; }
  .label {
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 6px;
  }
  .bar-track {
    height: 8px;
    background: #1f1f2e;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .4s ease;
  }
  .fill-green  { background: #27AE60; }
  .fill-yellow { background: #F39C12; }
  .fill-red    { background: #E74C3C; }

  .row {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 11px;
  }
  .reset { color: #5B9BD5; }
  .pct   { font-weight: 600; color: #e5e5e5; }

  .empty {
    text-align: center;
    color: #555;
    font-size: 12px;
    padding: 24px 0;
    line-height: 1.6;
  }
  .footer {
    font-size: 10px;
    color: #444;
    border-top: 1px solid #1f1f2e;
    padding-top: 10px;
    margin-top: 4px;
  }
  .tip {
    font-size: 10px;
    color: #555;
    margin-top: 6px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="dot gray" id="statusDot"></div>
    <span class="title">Claude Usage</span>
  </div>
  <div id="content">
    <div class="empty">
      No usage data yet.<br/>
      Open <b>Settings → Usage</b> on claude.ai<br/>to capture the initial reading.
    </div>
  </div>
  <div class="footer" id="footer"></div>
  <script src="popup.js"></script>
</body>
</html>
